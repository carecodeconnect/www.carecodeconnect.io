<div class="subscribe-widget">
  <p class="fw-bold mb-2">Subscribe to receive blog updates</p>
  <form
    action="https://buttondown.com/api/emails/embed-subscribe/carecodeconnect"
    method="post"
    class="embeddable-buttondown-form"
  >
    <label for="bd-email" class="form-label small">Enter your e-mail address</label>
    <input
      type="email"
      name="email"
      id="bd-email"
      class="form-control form-control-sm mb-2"
      required
      autocomplete="email"
    />
    <input type="submit" value="Subscribe" class="btn btn-primary btn-sm w-100 mb-2" />
    <p class="small mb-0">
      <a href="https://buttondown.com/refer/carecodeconnect" target="_blank" rel="noopener noreferrer">
        Powered by Buttondown
      </a>
    </p>
  </form>
  <p class="small text-muted mb-0 mt-2">
    <a href="blog.xml">RSS feed</a>
  </p>
</div>
